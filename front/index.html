<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery List</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-icon">🌿</span>
      Grocery List
    </div>

    <div class="sidebar-all" id="sidebar-all" onclick="setCatFilter(null)">
      <span>🛒</span>
      <span style="flex:1">All Items</span>
      <span class="badge" id="total-badge">0</span>
    </div>

    <div class="sidebar-label">CATEGORIES</div>
    <div class="sidebar-cats" id="sidebar-cats"></div>

    <button class="sidebar-add-cat" onclick="promptAddCategory()">+ Add Category</button>

    <div class="sidebar-quote">
      <span>🌿</span>
      Good food is the foundation of genuine happiness.
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main">

    <div class="main-header">
      <div class="main-title">
        <h2 id="page-title">All Items</h2>
        <p id="page-count">0 items</p>
      </div>
      <div class="main-icons">
        <div class="icon-btn" title="Toggle theme" onclick="toggleTheme()">☀️</div>
        <div class="icon-btn" title="Settings">⚙️</div>
      </div>
    </div>

    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🌿</span>
        <input class="search-input" id="search-input" placeholder="Add a grocery item..." />
      </div>
      <button class="add-btn" onclick="openPanel()">+ Add Item</button>
    </div>

    <div class="filter-tabs">
      <button class="tab active" data-f="all"    onclick="setStatusFilter('all')">All (<span id="tab-all">0</span>)</button>
      <button class="tab"        data-f="tobuy"  onclick="setStatusFilter('tobuy')">To Buy (<span id="tab-tobuy">0</span>)</button>
      <button class="tab"        data-f="bought" onclick="setStatusFilter('bought')">Bought (<span id="tab-bought">0</span>)</button>
    </div>

    <div class="items-scroll" id="items-list"></div>

    <div class="main-footer">🌿 Eat well. Live well.</div>

    <!-- ══ ADD PANEL ══ -->
    <input type="file" accept="image/*" capture="environment" id="cam-input" style="display:none">
    <div class="panel-overlay" id="panel-overlay" onclick="overlayClick(event)">
      <div class="panel" id="add-panel">
        <div class="panel-header">
          <span>🌿</span>
          <h3>Add New Item</h3>
          <div class="panel-close" onclick="closePanel()">✕</div>
        </div>

        <div>
          <label class="field-label">Item name</label>
          <input class="field-input" id="panel-name" placeholder="e.g. Apples" />
        </div>

        <div>
          <label class="field-label">Amount</label>
          <input class="field-input" id="panel-amount" placeholder="e.g. 500 g, 6 pcs, 1 L" />
        </div>

        <div>
          <label class="field-label">Category</label>
          <select class="field-select" id="panel-cat"></select>
        </div>

        <div>
          <label class="field-label">Repeat</label>
          <select class="field-select" id="panel-repeat">
            <option value="none">One-time</option>
            <option value="weekly">Every week</option>
            <option value="minute">Every minute</option>
          </select>
          <div class="field-hint">Weekly items reappear automatically for the next week.</div>
        </div>

        <div>
          <label class="field-label">Image (optional)</label>
          <div class="img-grid" id="img-grid"></div>
          <div class="view-more" onclick="showMoreEmojis()">View more ▾</div>
        </div>

        <div class="panel-actions">
          <button class="cancel-btn" onclick="closePanel()">Cancel</button>
          <button class="submit-btn" onclick="submitItem()">Add Item</button>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- Floating Add button for mobile -->
<button class="fab" onclick="openPanel()" aria-label="Add item">＋</button>

<!-- SUPABASE_URL -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let sb = null;
let items = [];
let nextId = 1;
let catFilter  = null;
let statusFilt = 'all';
let selEmoji   = '';
let selPhoto   = '';
let emojiPage  = 0;
let initDone   = false;

function mapItem(row) {
  return {
    id:        row.id,
    name:      row.name,
    amount:    row.amount || '',
    catId:     row.cat_id || 'other',
    emoji:     row.emoji || '',
    done:      row.done || false,
    createdAt: row.created_at,
  };
}

async function loadFromSupabase() {
  console.log('[DEBUG] SUPABASE_URL:', window.SUPABASE_URL);
  console.log('[DEBUG] SUPABASE_ANON_KEY:', window.SUPABASE_ANON_KEY ? 'present' : 'missing');
  if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
    console.warn('[DEBUG] Missing Supabase credentials - using localStorage');
    return false;
  }
  try {
    sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    console.log('[DEBUG] Supabase client created');
    const { data, error } = await sb.from('items').select('*').order('created_at', { ascending: false });
    console.log('[DEBUG] Select result:', { error, count: data?.length });
    if (error) throw error;
    if (data) {
      items = data.map(mapItem);
      console.log('[DEBUG] Loaded items:', items.length);
      if (items.length > 0) nextId = Math.max(...items.map(i => i.id)) + 1;
      else nextId = 1;
    }
    subscribeRealtime();
    return true;
  } catch (e) {
    console.warn('Supabase load failed, using localStorage:', e.message);
    return false;
  }
}

function subscribeRealtime() {
  if (!sb) return;
  console.log('[DEBUG] Subscribing to realtime changes...');
  sb.channel('items-sync')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'items' }, (p) => {
      console.log('[DEBUG] INSERT event received:', p.new, '| initDone:', initDone);
      if (initDone) {
        const newItem = mapItem(p.new);
        if (!items.find(i => i.id === newItem.id)) {
          items.unshift(newItem);
          if (newItem.id >= nextId) nextId = newItem.id + 1;
          render();
        }
      }
    })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'items' }, (p) => {
      console.log('[DEBUG] UPDATE event:', p.new);
      const idx = items.findIndex(i => i.id === p.new.id);
      if (idx !== -1) {
        items[idx] = mapItem(p.new);
        render();
      }
    })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'items' }, (p) => {
      console.log('[DEBUG] DELETE event:', p.old);
      items = items.filter(i => i.id !== p.old.id);
      render();
    })
    .subscribe((status) => {
      console.log('[DEBUG] Realtime subscription status:', status);
    });
}

async function init() {
  const ok = await loadFromSupabase();
  console.log('[DEBUG] init - Supabase loaded:', ok, '| items currently:', items.length);
  if (!ok) {
    const stored = JSON.parse(localStorage.getItem('grocery_v2') || 'null');
    items = stored ? stored.map(item => ({
      ...item,
      catId: item.catId || item.cat_id || 'other',
    })) : DEFAULT_ITEMS.map((item, idx) => ({ ...item, id: idx + 1 }));
    if (items.length > 0) nextId = Math.max(...items.map(i => i.id)) + 1;
    else nextId = 1;
  }
  items = items.map(item => {
    const repeat = item.repeat || 'none';
    const repeatKey = item.repeatKey || (repeat === 'weekly' ? item.weekKey || getWeekKey() : repeat === 'minute' ? item.minuteKey || getMinuteKey() : null);
    return {
      ...item,
      repeat,
      repeatKey,
      weekKey: item.weekKey || (repeat === 'weekly' ? repeatKey : null),
      minuteKey: item.minuteKey || (repeat === 'minute' ? repeatKey : null)
    };
  });
  initDone = true;
  render();
}

const CATEGORIES = [
  { id:'fv',    name:'Fruits & Veggies', icon:'🥬', color:'#3f6b2f', bg:'#e3f0dc' },
  { id:'dairy', name:'Dairy',            icon:'🥛', color:'#2d5fa0', bg:'#dae8f8' },
  { id:'pantry',name:'Pantry',           icon:'🫙', color:'#9e6018', bg:'#f5e8d2' },
  { id:'meat',  name:'Meat & Fish',      icon:'🍗', color:'#9e3030', bg:'#f8dede' },
  { id:'bev',   name:'Beverages',        icon:'☕', color:'#5e3f9e', bg:'#ece5f8' },
  { id:'other', name:'Other',            icon:'···',color:'#555',    bg:'#ebebeb' },
];

const EMOJI_PRESETS = ['🍎','🍌','🥦','🥛','🍞','🥚','🥕','🍗','🍝','🫒','🍚','🧅','🍅','🍋','🧀','🥩','☕','🍷','🧃','🧄'];

const DEFAULT_ITEMS = [
  {id:1,  name:'Bananas',       amount:'6 pcs',  catId:'fv',    emoji:'🍌', done:true  },
  {id:2,  name:'Spinach',       amount:'250 g',  catId:'fv',    emoji:'🥬', done:true  },
  {id:3,  name:'Milk',          amount:'1 L',    catId:'dairy', emoji:'🥛', done:true  },
  {id:4,  name:'Eggs',          amount:'12 pcs', catId:'dairy', emoji:'🥚', done:false },
  {id:5,  name:'Rice',          amount:'1 kg',   catId:'pantry',emoji:'🍚', done:false },
  {id:6,  name:'Chicken Breast',amount:'500 g',  catId:'meat',  emoji:'🍗', done:false },
  {id:7,  name:'Olive Oil',     amount:'500 ml', catId:'pantry',emoji:'🫒', done:false },
  {id:8,  name:'Bread',         amount:'1 loaf', catId:'other', emoji:'🍞', done:false },
  {id:9,  name:'Apples',        amount:'4 pcs',  catId:'fv',    emoji:'🍎', done:false },
  {id:10, name:'Carrots',       amount:'500 g',  catId:'fv',    emoji:'🥕', done:true  },
  {id:11, name:'Coffee',        amount:'250 g',  catId:'bev',   emoji:'☕', done:false },
  {id:12, name:'Pasta',         amount:'500 g',  catId:'pantry',emoji:'🍝', done:true  },
];

function save() { localStorage.setItem('grocery_v2', JSON.stringify(items)); }

function getWeekKey(date = new Date()) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, '0')}`;
}

function getMinuteKey(date = new Date()) {
  const d = new Date(date);
  return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}-${d.getHours()}-${d.getMinutes()}`;
}

function normalizeRecurringItems() {
  const currentWeek = getWeekKey();
  const currentMinute = getMinuteKey();
  const additions = [];

  items.forEach(item => {
    if (!item.repeatGroup || item.repeat === 'none') return;

    const currentBucket = item.repeat === 'weekly' ? currentWeek : item.repeat === 'minute' ? currentMinute : null;
    if (!currentBucket) return;

    const existingActive = items.some(candidate =>
      candidate.repeatGroup === item.repeatGroup &&
      candidate.repeat === item.repeat &&
      !candidate.done &&
      (candidate.repeatKey || candidate.weekKey || candidate.minuteKey) === currentBucket
    );

    const alreadyHasCurrentBucket = (item.repeatKey || item.weekKey || item.minuteKey) === currentBucket;
    if (!existingActive && !alreadyHasCurrentBucket) {
      additions.push({
        ...item,
        id: nextId++,
        done: false,
        repeatKey: currentBucket,
        weekKey: item.repeat === 'weekly' ? currentBucket : null,
        minuteKey: item.repeat === 'minute' ? currentBucket : null
      });
    }
  });

  if (additions.length) {
    items = [...additions, ...items];
    save();
  }
}

function getCat(id) { return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length-1]; }

function setCatFilter(id) {
  catFilter = id;
  statusFilt = 'all';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab[data-f="all"]').classList.add('active');
  render();
}

function setStatusFilter(s) {
  statusFilt = s;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-f="${s}"]`).classList.add('active');
  render();
}

function getDisplayed() {
  let f = catFilter ? items.filter(i => i.catId === catFilter) : items;
  if (statusFilt === 'tobuy')  f = f.filter(i => !i.done);
  if (statusFilt === 'bought') f = f.filter(i =>  i.done);
  return f;
}

function render() {
  normalizeRecurringItems();
  save();

  // Sidebar
  document.getElementById('total-badge').textContent = items.length;

  const sidebarAll = document.getElementById('sidebar-all');
  sidebarAll.style.background = catFilter ? '' : 'rgba(255,255,255,.94)';

  document.getElementById('sidebar-cats').innerHTML = CATEGORIES.map(cat => {
    const n = items.filter(i => i.catId === cat.id).length;
    return `<div class="sidebar-cat${catFilter===cat.id?' active':''}" onclick="setCatFilter('${cat.id}')">
      <span class="sidebar-cat-icon">${cat.icon}</span>
      <span style="flex:1">${cat.name}</span>
      <span class="sidebar-cat-count">${n}</span>
    </div>`;
  }).join('');

  // Title
  document.getElementById('page-title').textContent = catFilter ? getCat(catFilter).name : 'All Items';

  // Tab counts
  const base   = catFilter ? items.filter(i => i.catId === catFilter) : items;
  const toBuy  = base.filter(i => !i.done).length;
  const bought = base.filter(i =>  i.done).length;
  document.getElementById('tab-all').textContent    = base.length;
  document.getElementById('tab-tobuy').textContent  = toBuy;
  document.getElementById('tab-bought').textContent = bought;

  // Page count
  const disp = getDisplayed();
  document.getElementById('page-count').textContent = `${disp.length} item${disp.length!==1?'s':''}`;

  // Items
  const list = document.getElementById('items-list');
  if (!disp.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🛒</div><div>No items here yet</div></div>`;
    return;
  }

  list.innerHTML = disp.map(item => {
    const cat = getCat(item.catId);
    const imgContent = item.photo
      ? `<img src="${item.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;">`
      : (item.emoji||'🛒');
    return `<div class="item-row${item.done?' done':''}">
      <div class="item-check${item.done?' checked':''}" onclick="toggleItem(${item.id})">${item.done?'✓':''}</div>
      <div class="item-img">${imgContent}</div>
      <div class="item-name">${escHtml(item.name)}</div>
      ${item.amount?`<div class="item-amount">${escHtml(item.amount)}</div>`:''}
      <div class="cat-tag" style="color:${cat.color};background:${cat.bg}">${cat.name}</div>
      ${item.repeat === 'weekly' ? '<div class="repeat-pill">Weekly</div>' : ''}
      <div class="item-del" onclick="deleteItem(${item.id})">🗑</div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function toggleItem(id) {
  const it = items.find(i => i.id === id);
  if (!it) return;
  const newDone = !it.done;
  it.done = newDone;
  render();
  if (sb) {
    const { error } = await sb.from('items').update({ done: newDone }).eq('id', id);
    if (error) { console.warn('Sync failed:', error.message); save(); }
  } else {
    save();
  }
}

async function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  render();
  if (sb) {
    const { error } = await sb.from('items').delete().eq('id', id);
    if (error) { console.warn('Sync failed:', error.message); save(); }
  } else {
    save();
  }
}

// ── Panel ──
const CAT_EMOJI = {fv:'🥬',dairy:'🥛',pantry:'🫙',meat:'🍗',bev:'☕',other:'📦'};

function openPanel() {
  selEmoji  = '';
  selPhoto  = '';
  emojiPage = 0;
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('panel-name').value   = '';
  document.getElementById('panel-amount').value = '';

  const sel = document.getElementById('panel-cat');
  sel.innerHTML = CATEGORIES.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
  if (catFilter) sel.value = catFilter;

  renderEmojiGrid();
  setTimeout(()=>document.getElementById('panel-name').focus(), 50);
}

function renderEmojiGrid() {
  const start  = emojiPage * 5;
  const emojis = EMOJI_PRESETS.slice(start, start + 5);
  const camContent = selPhoto
    ? `<img src="${selPhoto}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">`
    : `<span class="img-upload">📷</span><span class="img-upload-lbl">Camera</span>`;
  document.getElementById('img-grid').innerHTML =
    `<div class="img-option${selPhoto?' selected':''}" onclick="document.getElementById('cam-input').click()" title="Take a photo">
       ${camContent}
     </div>` +
    emojis.map(e =>
      `<div class="img-option${selEmoji===e?' selected':''}" onclick="selectEmoji('${e}')">${e}</div>`
    ).join('');
}

function selectEmoji(e) {
  selEmoji = e;
  selPhoto = '';
  renderEmojiGrid();
}

function showMoreEmojis() {
  emojiPage = (emojiPage + 1) % Math.ceil((EMOJI_PRESETS.length) / 5);
  renderEmojiGrid();
}

function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('panel-overlay')) closePanel();
}

async function submitItem() {
  const name = document.getElementById('panel-name').value.trim();
  if (!name) { document.getElementById('panel-name').focus(); return; }
  const amount = document.getElementById('panel-amount').value.trim();
  const catId  = document.getElementById('panel-cat').value;
  const repeat = document.getElementById('panel-repeat').value;
  const emoji  = selEmoji || CAT_EMOJI[catId] || '🛒';
  const repeatGroup = repeat === 'none' ? null : `repeat-${Date.now()}`;
  const repeatKey = repeat === 'weekly' ? getWeekKey() : repeat === 'minute' ? getMinuteKey() : null;
  const newItem = {
    name,
    amount,
    cat_id: catId,
    emoji,
    done: false,
  };
  if (sb) {
    console.log('[DEBUG] Inserting item to Supabase:', newItem);
    const { data, error } = await sb.from('items').insert([newItem]).select().single();
    console.log('[DEBUG] Insert result:', { error, data });
    if (error) { console.warn('Sync failed:', error.message); }
    if (data) {
      const mapped = mapItem(data);
      items.unshift(mapped);
      if (data.id >= nextId) nextId = data.id + 1;
    }
  } else {
    items.unshift({ id: nextId++, name, amount, catId, emoji, photo: selPhoto || null, done: false, repeat, repeatGroup, repeatKey, weekKey: repeat === 'weekly' ? repeatKey : null, minuteKey: repeat === 'minute' ? repeatKey : null });
    save();
  }
  render(); closePanel();
}

function promptAddCategory() {
  const name = prompt('Category name:');
  if (!name || !name.trim()) return;
  const id = 'cat_' + Date.now();
  CATEGORIES.push({id, name:name.trim(), icon:'📦', color:'#555', bg:'#ebebeb'});
  render();
}

function toggleTheme() {
  document.body.classList.toggle('dark');
}

// Camera capture
document.getElementById('cam-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    selPhoto = e.target.result;
    selEmoji = '';
    renderEmojiGrid();
  };
  reader.readAsDataURL(file);
  this.value = '';
});

// Quick-add on Enter in search bar
document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && this.value.trim()) {
    openPanel();
    document.getElementById('panel-name').value = this.value.trim();
    this.value = '';
  }
});

init();
setInterval(async () => {
  normalizeRecurringItems();
  // Periodic refresh from Supabase as safety net for missed realtime events
  if (sb) {
    const { data } = await sb.from('items').select('*').order('created_at', { ascending: false });
    if (data) {
      const newItems = data.map(mapItem);
      if (JSON.stringify(newItems) !== JSON.stringify(items)) {
        console.log('[DEBUG] Periodic refresh: items changed, re-rendering');
        items = newItems;
        if (items.length > 0) nextId = Math.max(...items.map(i => i.id)) + 1;
        render();
      }
    }
  }
  render();
}, 60000);
</script>

</body>
</html>
